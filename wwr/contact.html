<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting</title>

    <meta name="description"
        content="Contact White Water Rafting for reservations, questions, trip information, and customer support.">

    <meta name="author" content="Unyime Eduok">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>

    <img src="images/z-crossedoars.webp" alt="Rafting Company Logo">

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="trips.html">Trips</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

</header>

<main>

    <section class="contact-info">

        <h1>Contact Us</h1>

        <p>White Water Rafting Company</p>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>Phone: +1 (999) 999-9999</p>
        <p>Email: info@whitewaterrafting.com</p>

    </section>

    <section class="contact-grid">

        <div class="map">
    <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d607950.9535739755!2d-112.97588512276943!3d40.814611628629834!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87523d9488d131ed%3A0x5b53b7a0484d31ca!2sSalt%20Lake%20City%2C%20UT%2C%20USA!5e0!3m2!1sen!2sng!4v1781221166954!5m2!1sen!2sng"
                width="100%"
                height="450"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                title="White Water Rafting Location">
            </iframe>
</div>

        <form class="contact-form">

            <div>
                <label for="fullname">Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <fieldset>
                <legend>Purpose of Message</legend>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>
            </fieldset>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>

            <label>
                <input type="checkbox" name="newsletter">
                Please subscribe me to the monthly newsletter
            </label>

            <button type="submit">Get In Touch!</button>

        </form>

    </section>

    <section class="employees">

        <h2>We Are Here to Serve You</h2>

        <div class="employee-gallery">

            <figure>
                <img src="images/employee1.webp" alt="Operations Manager">
                <figcaption>Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.webp" alt="Lead River Guide">
                <figcaption>Lead River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.webp" alt="Customer Service Manager">
                <figcaption>Customer Service Manager</figcaption>
            </figure>

        </div>

    </section>

</main>

<footer>

    <p>©2026 White Water Rafting | Unyime Eduok</p>

    <nav class="socialmedia">

        <a href="https://facebook.com">
            <img src="images/facebook-icon.webp" alt="Facebook">
        </a>

        <a href="https://instagram.com">
            <img src="images/instagram-icon.webp" alt="Instagram">
        </a>

        <a href="https://linkedin.com">
            <img src="images/linkedin-icon.webp" alt="LinkedIn">
        </a>

    </nav>

</footer>

</body>
</html>
